
services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: jobpulse-api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    container_name: jobpulse-ui
    ports:
      - "8501:8501"
    volumes:
      - ../data:/app/data
    environment:
      - PYTHONPATH=/app
      - JOBPULSE_API_BASE=http://api:8000
    depends_on:
      - api
    restart: unless-stopped